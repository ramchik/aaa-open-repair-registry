version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vascular_registry
      POSTGRES_USER: vascular
      POSTGRES_PASSWORD: vascular_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./002_vascular_registry_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

  backend:
    build: .
    environment:
      DATABASE_URL: postgres://vascular:vascular_secret@postgres:5432/vascular_registry
      PORT: 5000
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  postgres_data:
