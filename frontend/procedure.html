<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedure Entry – Vascular Registry</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Vascular Registry</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Patients</a></li>
        <li class="nav-item"><a class="nav-link active" href="procedure.html"><i class="bi bi-clipboard2-pulse me-1"></i>Add Procedure</a></li>
        <li class="nav-item"><a class="nav-link" href="followup.html"><i class="bi bi-calendar-check me-1"></i>Follow-up</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4" style="max-width:1100px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold text-primary"><i class="bi bi-clipboard2-pulse me-2"></i><span id="pageTitle">Add Procedure</span></h2>
    <a href="patients.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back to Patients</a>
  </div>

  <div id="alertBox"></div>

  <form id="procedureForm">
    <!-- ── Patient Selection ── -->
    <div class="form-section">
      <h5><i class="bi bi-person me-2"></i>Patient</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Patient <span class="required-star">*</span></label>
          <select name="patient_id" class="form-select" required id="patientSelect">
            <option value="">– Select patient –</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Procedure Type <span class="required-star">*</span></label>
          <select name="procedure_type" class="form-select" required id="procedureTypeSelect" onchange="updateProcType()">
            <option value="">– Select –</option>
            <optgroup label="Aortic">
              <option value="AAA_OPEN">AAA Open Repair</option>
              <option value="EVAR">EVAR</option>
              <option value="FEVAR">FEVAR (Fenestrated)</option>
              <option value="BEVAR">BEVAR (Branched)</option>
            </optgroup>
            <optgroup label="Carotid">
              <option value="CEA">Carotid Endarterectomy (CEA)</option>
              <option value="CAS">Carotid Artery Stenting (CAS)</option>
            </optgroup>
            <optgroup label="Peripheral">
              <option value="LOWER_EXTREMITY">Lower Extremity (PAD)</option>
            </optgroup>
            <optgroup label="Other">
              <option value="DIALYSIS_ACCESS">Dialysis Access</option>
              <option value="OTHER">Other</option>
            </optgroup>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Procedure Date <span class="required-star">*</span></label>
          <input type="date" name="procedure_date" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Surgeon Name</label>
          <input type="text" name="surgeon_name" class="form-control" placeholder="Operating surgeon">
        </div>
        <div class="col-md-4">
          <label class="form-label">Urgency</label>
          <select name="urgency" class="form-select">
            <option value="">– Select –</option>
            <option>Elective</option><option>Urgent</option><option>Emergent</option><option>Ruptured</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Anesthesia Type</label>
          <select name="anesthesia_type" class="form-select">
            <option value="">– Select –</option>
            <option>General</option><option>Regional/Spinal</option>
            <option>Local+Sedation</option><option>Local</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ── Pre-operative Risk Factors ── -->
    <div class="form-section">
      <h5><i class="bi bi-activity me-2"></i>Pre-operative Risk Factors</h5>
      <div class="row g-3">
        <div class="col-md-2">
          <label class="form-label">ASA Class</label>
          <select name="asa_class" class="form-select">
            <option value="">–</option>
            <option value="1">I</option><option value="2">II</option>
            <option value="3">III</option><option value="4">IV</option><option value="5">V</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Smoking Status</label>
          <select name="smoking_status" class="form-select">
            <option value="">–</option>
            <option>Never</option><option>Former</option><option>Current</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Pack-Years</label>
          <input type="number" name="pack_years" class="form-control" min="0" step="0.5">
        </div>
        <div class="col-md-3">
          <label class="form-label">Diabetes Type</label>
          <select name="diabetes_type" class="form-select">
            <option value="">–</option>
            <option>None</option><option>Type 1</option>
            <option>Type 2</option><option>Insulin-dependent</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">NYHA Class</label>
          <select name="nyha_class" class="form-select">
            <option value="">–</option>
            <option value="1">I</option><option value="2">II</option>
            <option value="3">III</option><option value="4">IV</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Preop Creatinine (mg/dL)</label>
          <input type="number" name="preop_creatinine" class="form-control" step="0.01" min="0">
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-12"><label class="form-label fw-semibold text-muted small">Comorbidities</label></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="hypertension" id="htn"><label class="form-check-label" for="htn">Hypertension</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="diabetes" id="dm"><label class="form-check-label" for="dm">Diabetes</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="dyslipidemia" id="dys"><label class="form-check-label" for="dys">Dyslipidemia</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="coronary_artery_disease" id="cad"><label class="form-check-label" for="cad">CAD</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="prior_mi" id="mi"><label class="form-check-label" for="mi">Prior MI</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="prior_pci_cabg" id="pci"><label class="form-check-label" for="pci">Prior PCI/CABG</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="congestive_heart_failure" id="chf"><label class="form-check-label" for="chf">CHF</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="chronic_kidney_disease" id="ckd"><label class="form-check-label" for="ckd">CKD</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="on_dialysis" id="dial"><label class="form-check-label" for="dial">On Dialysis</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="copd" id="copd"><label class="form-check-label" for="copd">COPD</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="prior_stroke_tia" id="stroke"><label class="form-check-label" for="stroke">Prior Stroke/TIA</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="anticoagulation" id="ac"><label class="form-check-label" for="ac">Anticoagulation</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="antiplatelet" id="ap"><label class="form-check-label" for="ap">Antiplatelet</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="statin_use" id="stat"><label class="form-check-label" for="stat">Statin Use</label></div></div>
      </div>
    </div>

    <!-- ── Operative Details ── -->
    <div class="form-section">
      <h5><i class="bi bi-scissors me-2"></i>Operative Details</h5>
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Operative Time (min)</label>
          <input type="number" name="operative_time_min" class="form-control" min="0">
        </div>
        <div class="col-md-3">
          <label class="form-label">Estimated Blood Loss (mL)</label>
          <input type="number" name="estimated_blood_loss_ml" class="form-control" min="0">
        </div>
        <div class="col-md-3">
          <label class="form-label">Transfusion Units (pRBC)</label>
          <input type="number" name="transfusion_units" class="form-control" min="0" value="0">
        </div>
      </div>
    </div>

    <!-- ── AAA-specific data (shown only for aortic procedures) ── -->
    <div class="form-section" id="aaaSection" style="display:none">
      <h5><i class="bi bi-rulers me-2"></i>AAA / Aortic Details</h5>
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Repair Type <span class="required-star">*</span></label>
          <select name="aaa_repair_type" class="form-select" id="aaaRepairType">
            <option value="">–</option>
            <option value="Open">Open</option><option value="EVAR">EVAR</option>
            <option value="FEVAR">FEVAR</option><option value="BEVAR">BEVAR</option>
            <option value="Chimney">Chimney EVAR</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Max AAA Ø (mm)</label>
          <input type="number" name="aaa_max_aaa_diameter_mm" class="form-control" min="0" max="200">
        </div>
        <div class="col-md-2">
          <label class="form-label">R Iliac Ø (mm)</label>
          <input type="number" name="aaa_max_iliac_diameter_right_mm" class="form-control" min="0">
        </div>
        <div class="col-md-2">
          <label class="form-label">L Iliac Ø (mm)</label>
          <input type="number" name="aaa_max_iliac_diameter_left_mm" class="form-control" min="0">
        </div>
        <div class="col-md-3">
          <label class="form-label">AAA Extent</label>
          <select name="aaa_aaa_extent" class="form-select">
            <option value="">–</option>
            <option>Infrarenal</option><option>Juxtarenal</option>
            <option>Pararenal</option><option>Suprarenal</option><option>Thoracoabdominal</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Neck Length (mm)</label>
          <input type="number" name="aaa_neck_length_mm" class="form-control" min="0">
        </div>
        <div class="col-md-2">
          <label class="form-label">Neck Angle (°)</label>
          <input type="number" name="aaa_neck_angle_deg" class="form-control" min="0" max="180">
        </div>
        <div class="col-md-3">
          <label class="form-label">Symptom Status</label>
          <select name="aaa_symptom_status" class="form-select">
            <option value="">–</option>
            <option>Asymptomatic</option><option>Symptomatic</option><option>Ruptured</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Indication</label>
          <input type="text" name="aaa_indication" class="form-control">
        </div>
      </div>

      <!-- Open-specific -->
      <div id="openFields">
        <hr class="my-3"><h6 class="text-secondary">Open Repair Details</h6>
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Approach</label>
            <select name="aaa_open_approach" class="form-select">
              <option value="">–</option>
              <option>Transperitoneal</option><option>Retroperitoneal</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Clamp Level</label>
            <select name="aaa_clamp_level" class="form-select">
              <option value="">–</option>
              <option>Infrarenal</option><option>Juxtarenal</option>
              <option>Suprarenal</option><option>Supraceliac</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Graft Configuration</label>
            <select name="aaa_graft_configuration" class="form-select">
              <option value="">–</option>
              <option>Tube</option><option>Bifurcated</option>
              <option>Aorto-iliac</option><option>Aorto-femoral</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Graft Brand</label>
            <input type="text" name="aaa_graft_brand" class="form-control" placeholder="e.g. Dacron, Gelweave">
          </div>
        </div>
      </div>

      <!-- EVAR-specific -->
      <div id="evarFields">
        <hr class="my-3"><h6 class="text-secondary">Endovascular Details</h6>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Device / Stent-Graft</label>
            <input type="text" name="aaa_evar_device" class="form-control" placeholder="e.g. Endurant, Zenith, Excluder">
          </div>
          <div class="col-md-3">
            <label class="form-label">Access</label>
            <select name="aaa_evar_access" class="form-select">
              <option value="">–</option>
              <option>Percutaneous</option><option>Cutdown</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Proximal Seal Zone</label>
            <select name="aaa_evar_proximal_seal_zone" class="form-select">
              <option value="">–</option>
              <option value="0">Zone 0 (Infrarenal)</option>
              <option value="1">Zone 1 (Juxtarenal)</option>
              <option value="2">Zone 2 (Pararenal)</option>
              <option value="3">Zone 3 (Visceral)</option>
              <option value="4">Zone 4 (Thoracic)</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Fenestrations / Branches</label>
            <div class="input-group">
              <span class="input-group-text">F</span>
              <input type="number" name="aaa_number_of_fenestrations" class="form-control" min="0" max="4" placeholder="0">
              <span class="input-group-text">B</span>
              <input type="number" name="aaa_number_of_branches" class="form-control" min="0" max="4" placeholder="0">
            </div>
          </div>
          <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="aaa_iliac_extension_right" id="ilr"><label class="form-check-label" for="ilr">R Iliac Ext.</label></div></div>
          <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="aaa_iliac_extension_left" id="ill"><label class="form-check-label" for="ill">L Iliac Ext.</label></div></div>
          <div class="col-md-3"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" name="aaa_conversion_to_open" id="conv"><label class="form-check-label" for="conv">Conversion to Open</label></div></div>
        </div>
      </div>

      <!-- AAA Complications -->
      <hr class="my-3"><h6 class="text-secondary">Peri-operative Complications</h6>
      <div class="row g-3">
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_cardiac_complication" id="cc"><label class="form-check-label" for="cc">Cardiac (MI/arrhythmia)</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_pulmonary_complication" id="pc"><label class="form-check-label" for="pc">Pulmonary</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_renal_complication" id="rc"><label class="form-check-label" for="rc">Renal (AKI/dialysis)</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_neurological_complication" id="nc"><label class="form-check-label" for="nc">Neurological (stroke/SCI)</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_wound_complication" id="wc"><label class="form-check-label" for="wc">Wound Infection</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_bowel_ischemia" id="bi"><label class="form-check-label" for="bi">Bowel Ischemia</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_limb_ischemia" id="li"><label class="form-check-label" for="li">Limb Ischemia</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_graft_complication" id="gc"><label class="form-check-label" for="gc">Graft Complication</label></div></div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_return_to_or" id="rtor"><label class="form-check-label" for="rtor">Return to OR</label></div></div>
        <div class="col-md-9">
          <label class="form-label">Return to OR Reason</label>
          <input type="text" name="aaa_return_to_or_reason" class="form-control">
        </div>
        <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="aaa_readmission_30day" id="readm"><label class="form-check-label" for="readm">30-day Readmission</label></div></div>
        <div class="col-md-9">
          <label class="form-label">Readmission Reason</label>
          <input type="text" name="aaa_readmission_reason" class="form-control">
        </div>
        <div class="col-md-12">
          <label class="form-label">Procedure Notes</label>
          <textarea name="aaa_procedure_notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- ── In-hospital Outcomes ── -->
    <div class="form-section">
      <h5><i class="bi bi-hospital me-2"></i>In-hospital Outcomes</h5>
      <div class="row g-3">
        <div class="col-md-2">
          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" name="in_hospital_mortality" id="mort">
            <label class="form-check-label fw-semibold text-danger" for="mort">In-hospital Mortality</label>
          </div>
        </div>
        <div class="col-md-3">
          <label class="form-label">Date of Death</label>
          <input type="date" name="mortality_date" class="form-control">
        </div>
        <div class="col-md-2">
          <label class="form-label">ICU Days</label>
          <input type="number" name="icu_days" class="form-control" min="0">
        </div>
        <div class="col-md-2">
          <label class="form-label">Hospital LOS (days)</label>
          <input type="number" name="hospital_los_days" class="form-control" min="0">
        </div>
        <div class="col-md-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 mb-5">
      <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-save me-2"></i>Save Procedure</button>
      <a href="patients.html" class="btn btn-outline-secondary btn-lg">Cancel</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
const AAA_TYPES = ['AAA_OPEN', 'EVAR', 'FEVAR', 'BEVAR'];

async function init() {
  // Populate patients dropdown
  const patients = await api.get('patients');
  const sel = document.getElementById('patientSelect');
  patients.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `${p.last_name}, ${p.first_name}${p.mrn ? ' (' + p.mrn + ')' : ''}`;
    sel.appendChild(o);
  });

  // Pre-select patient from URL
  const pid = qp('patient_id');
  if (pid) sel.value = pid;

  // Load existing procedure if editing
  const procId = qp('id');
  if (procId) {
    document.getElementById('pageTitle').textContent = 'View / Edit Procedure';
    const data = await api.get('procedures/' + procId);
    populateForm('procedureForm', data);
    if (data.aaa_data) {
      // Prefix aaa_ fields
      const aaa = data.aaa_data;
      Object.keys(aaa).forEach(k => {
        const el = document.getElementById('procedureForm').elements['aaa_' + k];
        if (!el) return;
        if (el.type === 'checkbox') el.checked = !!aaa[k];
        else if (el.type === 'date' && aaa[k]) el.value = aaa[k].substring(0,10);
        else el.value = aaa[k] ?? '';
      });
    }
    updateProcType();
  }
}

function updateProcType() {
  const type = document.getElementById('procedureTypeSelect').value;
  const aaaSection = document.getElementById('aaaSection');
  const isAAA = AAA_TYPES.includes(type);
  aaaSection.style.display = isAAA ? '' : 'none';

  if (isAAA) {
    // Auto-set repair type from procedure type
    const rt = document.getElementById('aaaRepairType');
    if (!rt.value) rt.value = type === 'AAA_OPEN' ? 'Open' : type;
    const isOpen = rt.value === 'Open';
    document.getElementById('openFields').style.display = isOpen ? '' : 'none';
    document.getElementById('evarFields').style.display = isOpen ? 'none' : '';
  }
}

document.getElementById('aaaRepairType')?.addEventListener('change', () => {
  const v = document.getElementById('aaaRepairType').value;
  document.getElementById('openFields').style.display = v === 'Open' ? '' : 'none';
  document.getElementById('evarFields').style.display = v === 'Open' ? 'none' : '';
});

document.getElementById('procedureForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = collectForm('procedureForm');

  // Build AAA sub-object from aaa_ prefixed fields
  const type = data.procedure_type;
  let aaaData = null;
  if (AAA_TYPES.includes(type)) {
    aaaData = {};
    Object.keys(data).forEach(k => {
      if (k.startsWith('aaa_')) {
        aaaData[k.replace('aaa_', '')] = data[k];
        delete data[k];
      }
    });
    data.aaa = aaaData;
  } else {
    // Remove aaa_ keys from data
    Object.keys(data).forEach(k => { if (k.startsWith('aaa_')) delete data[k]; });
  }

  const alertBox = document.getElementById('alertBox');
  try {
    const procId = qp('id');
    if (procId) {
      await api.put('procedures/' + procId, data);
    } else {
      await api.post('procedures', data);
    }
    alertBox.innerHTML = '<div class="alert alert-success">Procedure saved successfully! <a href="patients.html">Back to patients</a></div>';
    window.scrollTo(0, 0);
  } catch (err) {
    alertBox.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
    window.scrollTo(0, 0);
  }
});

init();
</script>
</body>
</html>
