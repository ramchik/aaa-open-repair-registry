<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patients – Vascular Registry</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Vascular Registry</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="patients.html"><i class="bi bi-people me-1"></i>Patients</a></li>
        <li class="nav-item"><a class="nav-link" href="procedure.html"><i class="bi bi-clipboard2-pulse me-1"></i>Add Procedure</a></li>
        <li class="nav-item"><a class="nav-link" href="followup.html"><i class="bi bi-calendar-check me-1"></i>Follow-up</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4">
  <!-- Add/Edit Patient Modal -->
  <div class="modal fade" id="patientModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="patientModalTitle"><i class="bi bi-person-plus me-2"></i>Add Patient</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="patientForm">
            <input type="hidden" name="id">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">First Name <span class="required-star">*</span></label>
                <input type="text" name="first_name" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Last Name <span class="required-star">*</span></label>
                <input type="text" name="last_name" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">MRN</label>
                <input type="text" name="mrn" class="form-control" placeholder="Medical Record #">
              </div>
              <div class="col-md-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" name="date_of_birth" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Sex</label>
                <select name="sex" class="form-select">
                  <option value="">– Select –</option>
                  <option>Male</option><option>Female</option><option>Other</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Race</label>
                <select name="race" class="form-select">
                  <option value="">– Select –</option>
                  <option>White</option><option>Black or African American</option>
                  <option>Hispanic or Latino</option><option>Asian</option>
                  <option>Native American</option><option>Other</option><option>Unknown</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Ethnicity</label>
                <select name="ethnicity" class="form-select">
                  <option value="">– Select –</option>
                  <option>Hispanic or Latino</option>
                  <option>Not Hispanic or Latino</option>
                  <option>Unknown</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control">
              </div>
              <div class="col-md-1">
                <label class="form-label">State</label>
                <input type="text" name="state" class="form-control" maxlength="2">
              </div>
              <div class="col-md-2">
                <label class="form-label">ZIP</label>
                <input type="text" name="zip" class="form-control">
              </div>
              <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input type="tel" name="phone" class="form-control">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="savePatientBtn"><i class="bi bi-save me-1"></i>Save Patient</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Patient Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title" id="detailModalTitle">Patient Detail</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detailModalBody">Loading…</div>
        <div class="modal-footer">
          <a id="addProcedureLink" href="procedure.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Procedure</a>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold text-primary"><i class="bi bi-people me-2"></i>Patients</h2>
    <button class="btn btn-primary" onclick="openAddPatient()"><i class="bi bi-person-plus me-1"></i>Add Patient</button>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="input-group" style="max-width:400px">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or MRN…" oninput="loadPatients()">
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Name</th><th>MRN</th><th>DOB / Age</th><th>Sex</th><th>Procedures</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <tr><td colspan="6" class="text-center text-muted py-4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
const patientModal = new bootstrap.Modal(document.getElementById('patientModal'));
const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

async function loadPatients() {
  const search = document.getElementById('searchInput').value;
  const tbody = document.getElementById('patientTableBody');
  try {
    const patients = await api.get('patients', { search });
    if (!patients.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No patients found.</td></tr>';
      return;
    }
    tbody.innerHTML = patients.map(p => `
      <tr>
        <td><strong>${p.last_name}, ${p.first_name}</strong></td>
        <td class="text-muted">${p.mrn || '–'}</td>
        <td>${p.date_of_birth ? fmtDate(p.date_of_birth) + ' (age ' + calcAge(p.date_of_birth) + ')' : '–'}</td>
        <td>${p.sex || '–'}</td>
        <td><span class="badge bg-primary">${p.procedure_count}</span></td>
        <td>
          <button class="btn btn-sm btn-outline-info me-1" onclick="viewPatient(${p.id})"><i class="bi bi-eye"></i></button>
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="editPatient(${p.id})"><i class="bi bi-pencil"></i></button>
          <a href="procedure.html?patient_id=${p.id}" class="btn btn-sm btn-outline-primary me-1" title="Add procedure"><i class="bi bi-clipboard2-plus"></i></a>
          <button class="btn btn-sm btn-outline-danger" onclick="deletePatient(${p.id}, '${p.first_name} ${p.last_name}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">${e.message}</td></tr>`;
  }
}

function openAddPatient() {
  document.getElementById('patientForm').reset();
  document.getElementById('patientModalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>Add Patient';
  document.getElementById('patientForm').elements['id'].value = '';
  patientModal.show();
}

async function editPatient(id) {
  const p = await api.get('patients/' + id);
  document.getElementById('patientModalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>Edit Patient';
  populateForm('patientForm', p);
  patientModal.show();
}

async function viewPatient(id) {
  document.getElementById('detailModalBody').innerHTML = 'Loading…';
  detailModal.show();
  const p = await api.get('patients/' + id);
  document.getElementById('detailModalTitle').textContent = p.last_name + ', ' + p.first_name;
  document.getElementById('addProcedureLink').href = 'procedure.html?patient_id=' + id;

  const procs = p.procedures || [];
  document.getElementById('detailModalBody').innerHTML = `
    <div class="row mb-3">
      <div class="col-md-6"><b>MRN:</b> ${p.mrn||'–'} &nbsp; <b>DOB:</b> ${fmtDate(p.date_of_birth)} (Age ${calcAge(p.date_of_birth)})</div>
      <div class="col-md-6"><b>Sex:</b> ${p.sex||'–'} &nbsp; <b>Race:</b> ${p.race||'–'}</div>
    </div>
    <h6 class="fw-bold text-primary">Procedures (${procs.length})</h6>
    ${procs.length === 0 ? '<p class="text-muted">No procedures recorded.</p>' :
      '<div class="table-responsive"><table class="table table-sm table-bordered">' +
      '<thead class="table-light"><tr><th>Date</th><th>Type</th><th>Max Ø</th><th>Urgency</th><th>Surgeon</th><th>Mortality</th><th></th></tr></thead>' +
      '<tbody>' + procs.map(pr => `<tr>
        <td>${fmtDate(pr.procedure_date)}</td>
        <td><span class="badge bg-secondary">${pr.procedure_type}</span></td>
        <td>${pr.max_aaa_diameter_mm ? pr.max_aaa_diameter_mm + ' mm' : '–'}</td>
        <td>${pr.urgency||'–'}</td>
        <td>${pr.surgeon_name||'–'}</td>
        <td>${pr.in_hospital_mortality ? '<span class="badge bg-danger">Yes</span>' : '<span class="badge bg-success">No</span>'}</td>
        <td><a href="procedure.html?id=${pr.id}" class="btn btn-sm btn-outline-primary">View</a></td>
      </tr>`).join('') + '</tbody></table></div>'
    }
  `;
}

async function deletePatient(id, name) {
  if (!confirm('Delete patient "' + name + '"? This will also delete all procedures and follow-ups.')) return;
  await api.delete('patients/' + id);
  loadPatients();
}

document.getElementById('savePatientBtn').addEventListener('click', async () => {
  const form = document.getElementById('patientForm');
  if (!form.reportValidity()) return;
  const data = collectForm('patientForm');
  const id = data.id;
  delete data.id;
  try {
    if (id) await api.put('patients/' + id, data);
    else await api.post('patients', data);
    patientModal.hide();
    loadPatients();
  } catch (e) {
    alert('Error: ' + e.message);
  }
});

loadPatients();
</script>
</body>
</html>
